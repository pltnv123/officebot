<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Frog Office</title>
<link rel="stylesheet" href="./style.css?v=9" />
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
</head>
<body>
<div id="app">
  <canvas id="scene"></canvas>
  <aside class="panel">
    <div><b>Активные:</b> <span id="active">0</span></div>
    <div><b>Выполненные:</b> <span id="done">0</span></div>
    <div class="now-card">
      <b>Сейчас делаю</b>
      <div id="now-doing" class="now-doing">Ожидаю задачи…</div>
    </div>
    <div class="task-columns">
      <div class="task-column">
        <h4>Активные</h4>
        <div id="tasks-active" class="tasks"></div>
      </div>
      <div class="task-column">
        <h4>Последние</h4>
        <div id="tasks-done" class="tasks tasks-done"></div>
      </div>
    </div>
  </aside>
</div>
<script type="module" src="./script.js?v=9"></script>
</body>
</html>
