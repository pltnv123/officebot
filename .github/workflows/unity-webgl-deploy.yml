name: Unity WebGL Build & Deploy

on:
  workflow_dispatch:
    inputs:
      test_backup_rotation:
        description: Test backup rotation policy safely
        required: false
        type: boolean
        default: false
  push:
    branches: [ main ]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'

concurrency:
  group: unity-webgl-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: false
    strategy:
      fail-fast: false
      max-parallel: 1
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GIT_HTTP_LOW_SPEED_LIMIT: 0
      GIT_HTTP_LOW_SPEED_TIME: 999999
    outputs:
      can_build: ${{ steps.chk.outputs.can_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - id: chk
        run: |
          if [ -f UnityProject/ProjectSettings/ProjectVersion.txt ] \
             && [ -f UnityProject/Assets/Editor/BuildScript.cs ]; then
            echo "can_build=true" >> $GITHUB_OUTPUT
          else
            echo "can_build=false" >> $GITHUB_OUTPUT
          fi

  generate-models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Blender
        run: |
          set -euo pipefail
          for i in 1 2 3; do
            sudo apt-get update -qq && sudo apt-get install -y blender python3-numpy && break
            echo "apt attempt $i failed, retrying..."
            sleep 10
          done
          blender --version

      - name: Generate Robot 3D Models
        run: |
          mkdir -p UnityProject/Assets/Models/Robots
          blender --background --python UnityProject/Assets/BlenderScripts/generate_robot.py
          ls -la UnityProject/Assets/Models/Robots/

      - name: Verify FBX files created
        run: |
          for f in WorkerBot PlannerBot ReviewerBot; do
            if [ ! -f "UnityProject/Assets/Models/Robots/${f}.fbx" ]; then
              echo "ERROR: ${f}.fbx not found!"
              exit 1
            fi
            echo "OK: ${f}.fbx exists"
          done

      - name: Upload robot models as artifact
        uses: actions/upload-artifact@v4
        with:
          name: robot-models
          path: UnityProject/Assets/Models/Robots/

  build-unity:
    needs: [preflight, generate-models]
    if: needs.preflight.outputs.can_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    strategy:
      max-parallel: 1
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Download robot models
        uses: actions/download-artifact@v4
        with:
          name: robot-models
          path: UnityProject/Assets/Models/Robots/
      - name: Build Unity WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: WebGL
          projectPath: UnityProject
          buildMethod: BuildScript.BuildWebGL
          versioning: None
      - uses: actions/upload-artifact@v4
        with:
          name: webgl-build
          path: UnityProject/Builds/WebGL

  build-bootstrap:
    needs: preflight
    if: needs.preflight.outputs.can_build != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      max-parallel: 1
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Package existing Web build
        run: |
          mkdir -p out
          cp -r Build out/Build
          cp -r TemplateData out/TemplateData || true
      - uses: actions/upload-artifact@v4
        with:
          name: webgl-build
          path: out

  deploy:
    needs: [build-unity, build-bootstrap]
    if: always() && (needs.build-unity.result == 'success' || needs.build-bootstrap.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: webgl-build
          path: webgl
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      - name: Backup current production
        run: |
          set -euo pipefail
          echo "Creating backup..."
          TIMESTAMP=$(date +%s)
          BACKUP_DIR="/var/www/office_backups"
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p $BACKUP_DIR"
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "tar -czf $BACKUP_DIR/backup_$TIMESTAMP.tar.gz -C / var/www/office"
          echo "Backup created: $BACKUP_DIR/backup_$TIMESTAMP.tar.gz"
          echo "BACKUP_PATH=$BACKUP_DIR/backup_$TIMESTAMP.tar.gz" >> $GITHUB_ENV
      - name: Verify backup hashes
        run: |
          set -euo pipefail
          BACKUP_PATH="${{ env.BACKUP_PATH }}"
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "BACKUP_PATH='$BACKUP_PATH' bash -lc '
            set -euo pipefail
            compare_hash() {
              local live="$1"
              local entry="$2"
              local live_hash
              live_hash=$(sha256sum "$live" | { read -r hash rest; printf "%s" "$hash"; })
              local backup_hash
              backup_hash=$(tar -xOf "$BACKUP_PATH" "$entry" | { read -r hash rest; printf "%s" "$hash"; })
              echo "[backup-hash] live $live: $live_hash"
              echo "[backup-hash] backup $entry: $backup_hash"
              if [ "$live_hash" != "$backup_hash" ]; then
                echo "[backup-hash] mismatch for $live" >&2
                exit 1
              fi
            }
            compare_hash /var/www/office/Build/office.loader.js var/www/office/Build/office.loader.js
            compare_hash /var/www/office/Build/office.framework.js var/www/office/Build/office.framework.js
          '
      - name: Deploy Build
        run: |
          set -euo pipefail
          echo "Artifact layout:"
          find webgl -maxdepth 3 -type d | sort

          # Support both layouts:
          # A) webgl/Build + webgl/TemplateData
          # B) webgl/WebGL/Build + webgl/WebGL/TemplateData
          BUILD_SRC=""
          TPL_SRC=""

          if [ -d webgl/Build ]; then
            BUILD_SRC="webgl/Build"
            [ -d webgl/TemplateData ] && TPL_SRC="webgl/TemplateData"
          elif [ -d webgl/WebGL/Build ]; then
            BUILD_SRC="webgl/WebGL/Build"
            [ -d webgl/WebGL/TemplateData ] && TPL_SRC="webgl/WebGL/TemplateData"
          else
            echo "ERROR: Build directory not found in artifact"
            find webgl -maxdepth 4 -type f | head -n 200
            exit 1
          fi

          # Avoid metadata/mtime permission errors on target dir
          RSYNC_FLAGS="-rlvz --delete --omit-dir-times --no-perms --no-owner --no-group --ignore-errors"
          rsync $RSYNC_FLAGS "$BUILD_SRC/" ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/office/Build/
          if [ -n "$TPL_SRC" ]; then
            rsync $RSYNC_FLAGS "$TPL_SRC/" ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/office/TemplateData/
          fi
      - name: Health check
        run: |
          set -euo pipefail
          echo "Checking health endpoint..."
          curl -fsS "http://${{ secrets.VPS_HOST }}/healthz" >/dev/null || true

  test-backup-rotation:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.test_backup_rotation == 'true' }}
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      - name: Create test directory and dummy backups
        run: |
          TEST_DIR="/var/www/office_backups_test_$(date +%s)"
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "mkdir -p $TEST_DIR"
          # Create 12 dummy backup files with unique names
          for i in $(seq 1 12); do
            ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "touch $TEST_DIR/backup_$(date +%s).tar.gz"
          done
          echo "Created 12 dummy backups in $TEST_DIR"
          echo "TEST_DIR=$TEST_DIR" >> $GITHUB_ENV
      - name: Run prune logic
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} '
            set -euo pipefail
            cd "${{ env.TEST_DIR }}"
            ls -t backup_*.tar.gz 2>/dev/null | tail -n +11 | xargs -r rm -f
            REMAINING=$(ls -1 backup_*.tar.gz 2>/dev/null | wc -l)
            echo "Remaining backups: $REMAINING"
            if [ "$REMAINING" -ne 10 ]; then
              echo "ERROR: Expected 10 backups, got $REMAINING"
              exit 1
            fi
          '
      - name: Cleanup test directory
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} "rm -rf ${{ env.TEST_DIR }}"

