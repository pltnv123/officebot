name: Unity WebGL Build & Deploy

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: false
    strategy:
      fail-fast: false
      max-parallel: 1
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      GIT_HTTP_LOW_SPEED_LIMIT: 0
      GIT_HTTP_LOW_SPEED_TIME: 999999
    outputs:
      can_build: ${{ steps.chk.outputs.can_build }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - id: chk
        run: |
          if [ -f UnityProject/ProjectSettings/ProjectVersion.txt ] \
             && [ -f UnityProject/Assets/Editor/BuildScript.cs ]; then
            echo "can_build=true" >> $GITHUB_OUTPUT
          else
            echo "can_build=false" >> $GITHUB_OUTPUT
          fi

  generate-models:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Blender
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y blender python3-numpy
          blender --version

      - name: Generate Robot 3D Models
        run: |
          mkdir -p UnityProject/Assets/Models/Robots
          blender --background --python UnityProject/Assets/BlenderScripts/generate_robot.py
          ls -la UnityProject/Assets/Models/Robots/

      - name: Verify FBX files created
        run: |
          for f in WorkerBot PlannerBot ReviewerBot; do
            if [ ! -f "UnityProject/Assets/Models/Robots/${f}.fbx" ]; then
              echo "ERROR: ${f}.fbx not found!"
              exit 1
            fi
            echo "OK: ${f}.fbx exists"
          done

      - name: Upload robot models as artifact
        uses: actions/upload-artifact@v4
        with:
          name: robot-models
          path: UnityProject/Assets/Models/Robots/

  build-unity:
    needs: [preflight, generate-models]
    if: needs.preflight.outputs.can_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      max-parallel: 1
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Download robot models
        uses: actions/download-artifact@v4
        with:
          name: robot-models
          path: UnityProject/Assets/Models/Robots/
      - name: Build Unity WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: WebGL
          projectPath: UnityProject
          buildMethod: BuildScript.BuildWebGL
          versioning: None
      - uses: actions/upload-artifact@v4
        with:
          name: webgl-build
          path: UnityProject/Builds/WebGL

  build-bootstrap:
    needs: preflight
    if: needs.preflight.outputs.can_build != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      max-parallel: 1
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Package existing Web build
        run: |
          mkdir -p out
          cp -r Build out/Build
          cp -r TemplateData out/TemplateData || true
      - uses: actions/upload-artifact@v4
        with:
          name: webgl-build
          path: out

  deploy:
    needs: [build-unity, build-bootstrap]
    if: always() && (needs.build-unity.result == 'success' || needs.build-bootstrap.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: webgl-build
          path: webgl
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      - name: Deploy Build
        run: |
          # Avoid metadata/mtime permission errors on target dir
          RSYNC_FLAGS="-rlvz --delete --omit-dir-times --no-perms --no-owner --no-group --ignore-errors"
          rsync $RSYNC_FLAGS webgl/Build/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/office/Build/
          if [ -d webgl/TemplateData ]; then
            rsync $RSYNC_FLAGS webgl/TemplateData/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/office/TemplateData/
          fi
      - name: Smoke check
        run: |
          curl -fsS "http://${{ secrets.VPS_HOST }}/office/index.html" >/dev/null
          echo "Deploy smoke-check passed"

