name: Unity WebGL Build & Deploy

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  preflight:
    runs-on: ubuntu-latest
    continue-on-error: false
    strategy:
      fail-fast: false
    env:
      GIT_HTTP_LOW_SPEED_LIMIT: 0
      GIT_HTTP_LOW_SPEED_TIME: 999999
    outputs:
      can_build: ${{ steps.chk.outputs.can_build }}
    steps:
      - name: Checkout with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 5
          retry_wait_seconds: 30
          command: git clone --depth=1 https://github.com/${{ github.repository }}.git .
      - id: chk
        run: |
          if [ -f UnityProject/ProjectSettings/ProjectVersion.txt ] \
             && [ -f UnityProject/Assets/Editor/BuildScript.cs ]; then
            echo "can_build=true" >> $GITHUB_OUTPUT
          else
            echo "can_build=false" >> $GITHUB_OUTPUT
          fi

  build-unity:
    needs: preflight
    if: needs.preflight.outputs.can_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 5
          retry_wait_seconds: 30
          command: git clone --depth=1 https://github.com/${{ github.repository }}.git .
      - name: Build Unity WebGL
        uses: game-ci/unity-builder@v4
        env:
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: WebGL
          projectPath: UnityProject
          buildMethod: BuildScript.BuildWebGL
      - uses: actions/upload-artifact@v4
        with:
          name: webgl-build
          path: UnityProject/Builds/WebGL

  build-bootstrap:
    needs: preflight
    if: needs.preflight.outputs.can_build != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 5
          retry_wait_seconds: 30
          command: git clone --depth=1 https://github.com/${{ github.repository }}.git .
      - name: Package existing Web build
        run: |
          mkdir -p out
          cp -r Build out/Build
          cp -r TemplateData out/TemplateData || true
      - uses: actions/upload-artifact@v4
        with:
          name: webgl-build
          path: out

  deploy:
    needs: [build-unity, build-bootstrap]
    if: always() && (needs.build-unity.result == 'success' || needs.build-bootstrap.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: webgl-build
          path: webgl
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts
      - name: Deploy Build
        run: |
          # Avoid metadata/mtime permission errors on target dir
          RSYNC_FLAGS="-rlvz --delete --omit-dir-times --no-perms --no-owner --no-group"
          rsync $RSYNC_FLAGS webgl/Build/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/office/Build/
          if [ -d webgl/TemplateData ]; then
            rsync $RSYNC_FLAGS webgl/TemplateData/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/office/TemplateData/
          fi
      - name: Smoke check
        run: |
          curl -fsS "http://${{ secrets.VPS_HOST }}/office/index.html" >/dev/null
          echo "Deploy smoke-check passed"
